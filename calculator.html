<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="calculator.css"
    />
    <title>Calculator</title>
  </head>
  <body>
    <main>
      <section class="container display">
        <div class="log">R</div>
        <div class="num">0</div>
      </section>
      <section class="container button">
        <button class="btn deg">deg | rad</button>
        <button class="btn factorial">x!</button>
        <button class="btn open-bracket">(</button>
        <button class="btn close-bracket">)</button>
        <button class="btn modulo">%</button>
        <button class="btn clear">CE</button>

        <button class="btn inv">inv</button>
        <button class="btn sin">sin</button>
        <button class="btn ln">ln</button>
        <button class="btn seven">7</button>
        <button class="btn eight">8</button>
        <button class="btn nine">9</button>
        <button class="btn divide">/</button>

        <button class="btn phi">phi</button>
        <button class="btn cos">cos</button>
        <button class="btn log">log</button>
        <button class="btn four">4</button>
        <button class="btn five">5</button>
        <button class="btn six">6</button>
        <button class="btn multiply">x</button>

        <button class="btn e">e</button>
        <button class="btn tan">tan</button>
        <button class="btn sqrt">√</button>
        <button class="btn one">1</button>
        <button class="btn two">2</button>
        <button class="btn three">3</button>
        <button class="btn subtract">-</button>
        <button class="btn ans">ans</button>
        <button class="btn exp">exp</button>
        <button class="btn pow">xʸ</button>
        <button class="btn zero">0</button>
        <button class="btn dot">.</button>
        <button class="btn equals">=</button>
        <button class="btn add">+</button>
      </section>
    </main>
  </body>
</html>
